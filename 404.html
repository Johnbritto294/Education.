<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found | Stackly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--primary:#D4AF37;--primary-dark:#B59410;--dark:#0A192F;--gray:#8892B0;--light:#F8F9FA;--white:#FFFFFF;--border:#1B2D4A;--radius:14px;--shadow:0 4px 24px rgba(212,175,55,.08);--shadow-lg:0 12px 48px rgba(212,175,55,.12);--transition:.3s cubic-bezier(.4,0,.2,1)}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--light);overflow-x:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .notfound{text-align:center;padding:40px 5%;max-width:640px}
  .nf-code{font-family:'Sora',sans-serif;font-size:clamp(6rem,15vw,10rem);font-weight:800;color:transparent;-webkit-text-stroke:2px var(--primary);line-height:1;letter-spacing:-4px;margin-bottom:16px;opacity:.9}
  .nf-title{font-family:'Sora',sans-serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;color:var(--white);margin-bottom:14px;letter-spacing:-1px}
  .nf-desc{font-size:1rem;color:var(--gray);line-height:1.7;margin-bottom:36px}
  .nf-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn-primary{padding:12px 26px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--transition);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .btn-outline{padding:12px 26px;border:2px solid var(--primary);border-radius:10px;color:var(--primary);background:transparent;cursor:pointer;font-size:.9rem;font-weight:600;transition:var(--transition);text-decoration:none;display:inline-flex;align-items:center;gap:8px}
  .btn-outline:hover{background:var(--primary);color:#fff}
  .nf-blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.25;z-index:0;pointer-events:none}
  .nf-blob-1{width:400px;height:400px;background:var(--primary);top:-100px;right:-100px}
  .nf-blob-2{width:300px;height:300px;background:var(--primary);bottom:-80px;left:-80px;opacity:.15}
  .notfound{position:relative;z-index:1}
</style>
</head>
<body>
<div class="nf-blob nf-blob-1"></div>
<div class="nf-blob nf-blob-2"></div>
<div class="notfound">
  <div class="nf-code">404</div>
  <h1 class="nf-title">Page Not Found</h1>
  <p class="nf-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="nf-actions">
    <a href="index.html" class="btn-primary">← Back to Home</a>
    <button class="btn-outline" onclick="if(history.length>1){history.back()}else{location.href='index.html'}">← Previous Page</button>
  </div>
</div>
</body>
</html>
